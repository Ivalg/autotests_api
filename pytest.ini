[pytest]

addopts = -s -v
python_files = *_tests.py test_*.py
python_classes = Test*
python_functions = test_*

markers=
    users: Маркировки для тестов, связанных с пользователями
    files: Маркировки для тестов, связанных с файлами
    regression: Маркировка для регрессионных тестов
    authentication: Маркировка для тестов аутентификации
    